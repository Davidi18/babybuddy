{% load i18n %}
<button type="submit"
        class="quick-btn-sleep {% if sleep_active %}active{% else %}inactive{% endif %}">
    <span class="quick-btn-icon">💤</span>
    <span class="quick-btn-label">{% if sleep_active %}{% trans "Stop Sleep" %}{% else %}{% trans "Sleep" %}{% endif %}</span>
</button>
